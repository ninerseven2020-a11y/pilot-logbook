<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Logbook - Pilot Logbook</title>
    <link rel="stylesheet" href="static/style.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body data-page="upload">
    <header>
        <div class="header-content">
            <div class="logo-section">
                <div class="logo">
                    <h1>Logbook</h1>
                </div>
                <nav class="nav-links">
                    <a href="/dashboard" class="nav-item">Dashboard</a>
                    <a href="/preview" class="nav-item">Logbook</a>
                    <a href="/upload" class="nav-item active">Upload</a>
                    <a href="/manage" class="nav-item">Manage</a>
                </nav>
            </div>
            <div class="actions">
                <div class="user-menu-container">
                    <button class="user-icon-btn" id="user-icon-btn" onclick="toggleProfilePopover()" title="My Profile">
                        <span id="user-avatar-initial">?</span>
                    </button>
                    <div class="profile-popover" id="profile-popover">
                        <div class="popover-user-section">
                            <div class="popover-avatar" id="popover-avatar">?</div>
                            <div class="popover-user-info">
                                <div class="popover-name" id="popover-name">—</div>
                                <div class="popover-email" id="popover-email">—</div>
                            </div>
                        </div>
                        <div class="popover-divider"></div>
                        <div class="popover-badges" id="popover-badges"></div>
                        <div class="popover-divider"></div>
                        <button class="popover-menu-item" onclick="openEditProfileModal()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            Edit Profile
                        </button>
                        <button class="popover-menu-item popover-logout" onclick="handleLogout()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                            Sign Out
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="upload-form-card glass">
            <div class="section-header">
                <h2>Import Flight Data</h2>
            </div>

            <form id="upload-form" class="auth-form" onsubmit="handleAdvancedUpload(event)">
                <div class="upload-grid">
                    <div class="form-group datalist-wrapper">
                        <label for="operator">Operator</label>
                        <input type="text" id="operator" list="operator-list" placeholder="e.g. NHV, GFS, FTA" required>
                        <datalist id="operator-list">
                            <!-- Populated by JS -->
                        </datalist>
                    </div>

                    <div class="form-group datalist-wrapper">
                        <label for="label">Label</label>
                        <input type="text" id="label" list="label-list" placeholder="e.g. Initial Training, Secondment, Line Flying, PPEP..." required>
                        <datalist id="label-list">
                            <!-- Populated by JS -->
                        </datalist>
                    </div>
                </div>

                <div class="upload-methods-container">
                    <!-- Manual Input Section -->
                    <div class="manual-input-section">
                        <h3 class="section-subtitle">Manual Input</h3>
                    
                    <!-- Subsection 1: Aircraft Info -->
                    <div class="manual-subsection-group">
                        <div class="manual-grid">
                            <div class="form-group">
                                <label for="manual-date">*DATE</label>
                                <input type="date" id="manual-date">
                            </div>
                            <div class="form-group">
                                <label for="manual-ac-type">*AC TYPE</label>
                                <input type="text" id="manual-ac-type" placeholder="H175">
                            </div>
                            <div class="form-group">
                                <label for="manual-ac-reg">*AC REG</label>
                                <input type="text" id="manual-ac-reg" placeholder="G-XXXX">
                            </div>
                        </div>
                    </div>

                    <!-- Subsection 2: Crew Info -->
                    <div class="manual-subsection-group">
                        <div class="manual-grid">
                            <div class="form-group">
                                <label for="manual-pic">*CAPTAIN</label>
                                <input type="text" id="manual-pic">
                            </div>
                            <div class="form-group">
                                <label for="manual-copilot">COPILOT</label>
                                <input type="text" id="manual-copilot">
                            </div>
                            <div class="form-group">
                                <label for="manual-capacity">*OPERATING CAPACITY</label>
                                <input type="text" id="manual-capacity">
                            </div>
                        </div>
                    </div>

                    <!-- Subsection 3: Journey Info -->
                    <div class="manual-subsection-group">
                        <div class="manual-grid journey-grid">
                            <div class="form-group">
                                <label for="manual-route">ROUTE</label>
                                <input type="text" id="manual-route">
                            </div>
                            <div class="form-group">
                                <label for="manual-dep">DEP</label>
                                <input type="text" id="manual-dep" placeholder="HHMM">
                            </div>
                            <div class="form-group">
                                <label for="manual-arr">ARR</label>
                                <input type="text" id="manual-arr" placeholder="HHMM">
                            </div>
                            <div class="form-group">
                                <label>TOTAL</label>
                                <input type="text" id="manual-total-input" class="smart-decimal" value="0.0">
                            </div>
                        </div>
                    </div>

                        <div class="flying-hours-columns">
                            <div class="flying-column-left">
                                <!-- Day Flying -->
                                <div class="flying-subsection">
                                    <h4>Day Flying</h4>
                                    <div class="flying-inputs">
                                        <div class="form-group">
                                            <label>P1</label>
                                            <input type="text" class="smart-decimal" id="day-p1" value="0.0">
                                        </div>
                                        <div class="form-group">
                                            <label>P1 (U/S)</label>
                                            <input type="text" class="smart-decimal" id="day-p1us" value="0.0">
                                        </div>
                                        <div class="form-group">
                                            <label>P2</label>
                                            <input type="text" class="smart-decimal" id="day-p2" value="0.0">
                                        </div>
                                        <div class="form-group">
                                            <label>P U/T</label>
                                            <input type="text" class="smart-decimal" id="day-put" value="0.0">
                                        </div>
                                    </div>
                                </div>

                                <!-- Night Flying -->
                                <div class="flying-subsection">
                                    <h4>Night Flying</h4>
                                    <div class="flying-inputs">
                                        <div class="form-group">
                                            <label>P1</label>
                                            <input type="text" class="smart-decimal" id="night-p1" value="0.0">
                                        </div>
                                        <div class="form-group">
                                            <label>P1 (U/S)</label>
                                            <input type="text" class="smart-decimal" id="night-p1us" value="0.0">
                                        </div>
                                        <div class="form-group">
                                            <label>P2</label>
                                            <input type="text" class="smart-decimal" id="night-p2" value="0.0">
                                        </div>
                                        <div class="form-group">
                                            <label>P U/T</label>
                                            <input type="text" class="smart-decimal" id="night-put" value="0.0">
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="flying-column-right">
                                <!-- Instrument -->
                                <div class="flying-subsection">
                                    <h4>Instrument</h4>
                                    <div class="flying-inputs single-column">
                                        <div class="form-group">
                                            <input type="text" class="smart-decimal" id="manual-instr" value="0.0">
                                        </div>
                                    </div>
                                </div>
                                <!-- Simulator -->
                                <div class="flying-subsection">
                                    <h4>Simulator</h4>
                                    <div class="flying-inputs single-column">
                                        <div class="form-group">
                                            <input type="text" class="smart-decimal" id="manual-sim" value="0.0">
                                        </div>
                                    </div>
                                </div>
                                <!-- Remarks -->
                                <div class="flying-subsection">
                                    <h4>Remarks</h4>
                                    <div class="flying-inputs single-column">
                                        <div class="form-group" style="width: 100%;">
                                            <input type="text" id="manual-remarks" placeholder="Add remarks...">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    <div class="form-actions" style="margin-top: 1.5rem; text-align: right;">
                        <button type="button" class="btn btn-primary" onclick="handleManualSubmit()">Save</button>
                    </div>
                </div>

                <div class="file-input-section">
                    <h3 class="section-subtitle">Import via excel or image</h3>
                    <div class="form-group">
                        <div class="file-drop-zone" id="drop-zone" onclick="document.getElementById('excel-file').click()">
                            <span class="icon">📄</span>
                            <p id="file-name">Click to add or drag files here</p>
                            <input type="file" id="excel-file" accept=".xlsx, .xls" style="display: none;" onchange="updateFileName(this)">
                        </div>
                    </div>

                    <div class="form-actions" style="margin-top: 2rem; text-align: right;">
                        <button type="submit" class="btn btn-primary">Upload</button>
                    </div>
                </div>
            </div>
            </form>
        </div>
    </main>

    <!-- Edit Profile Modal -->
    <div id="profile-modal" class="modal">
        <div class="modal-content glass">
            <div class="flex-between" style="margin-bottom: 1.5rem;">
                <h2>Edit Profile</h2>
                <button class="btn-close" onclick="closeEditProfileModal()">&times;</button>
            </div>
            <form id="profile-form" onsubmit="handleUpdateProfile(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="edit-full-name">Full Name</label>
                        <input type="text" id="edit-full-name" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-pilot-name">Pilot Name (Logbook)</label>
                        <input type="text" id="edit-pilot-name" required>
                    </div>

                    <div class="form-group">
                        <label for="edit-license">License Type</label>
                        <input type="text" id="edit-license" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-aircraft">Aircraft Type</label>
                        <input type="text" id="edit-aircraft" required>
                    </div>
                    <div class="form-group">
                        <label for="edit-email">Email Address</label>
                        <input type="email" id="edit-email" placeholder="e.g. pilot@gmail.com">
                    </div>
                </div>
                <div class="form-group" style="margin-top: 1.5rem; text-align: right;">
                    <button type="button" class="btn btn-secondary" onclick="closeEditProfileModal()" style="margin-right: 0.5rem;">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="static/script.js?v=5"></script>
</body>
</html>
