<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Pilot Logbook</title>
    <link rel="stylesheet" href="static/style.css?v=1.2.33">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container glass large">
        <div class="auth-header">
            <span class="logo-icon large">✈️</span>
            <h1>Create Account</h1>
            <p>Join the digital pilot community</p>
        </div>
        <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Unique username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                            <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="pilot_name">Pilot Name (Logbook)</label>
                    <input type="text" id="pilot_name" placeholder="J DOE" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label for="license_type">License Type</label>
                    <input type="text" id="license_type" placeholder="CPL(H), ATPL(A)" required>
                </div>
                <div class="form-group">
                    <label for="aircraft_type">Aircraft Type</label>
                    <input type="text" id="aircraft_type" placeholder="H175, B737" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>
        <div class="auth-footer">
            <p>Already have an account? <a href="/login">Sign in</a></p>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <div class="version-label">v1.2.33</div>
    <script>const APP_VERSION = "1.2.33"</script>
    <script src="static/script.js?v=1.2.33"></script>
</body>
</html>
