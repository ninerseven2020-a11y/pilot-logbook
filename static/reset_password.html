<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Pilot Logbook</title>
    <link rel="stylesheet" href="static/style.css?v=1.2.46">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container glass">
        <div class="auth-header">
            <span class="logo-icon large">🔒</span>
            <h1>New Password</h1>
            <p>Please enter your new password below</p>
        </div>
        <form id="reset-form" class="auth-form" onsubmit="handleResetPassword(event)">
            <div class="form-group">
                <label for="new_password">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="new_password" placeholder="••••••••" required minlength="6">
                    <button type="button" class="password-toggle" onclick="togglePassword('new_password', this)">
                        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Update Password</button>
        </form>
        <div class="auth-footer">
            <p><a href="/login">Back to Login</a></p>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="static/script.js?v=1.2.46"></script>
    <script>
        // Check if token exists in URL
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (!token) {
                showToast("Invalid or missing reset token", true);
                setTimeout(() => window.location.href = '/login', 2000);
            }
        };

        async function handleResetPassword(event) {
            event.preventDefault();
            const password = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;
            
            if (password !== confirm) {
                showToast("Passwords do not match", true);
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            const formData = new FormData();
            formData.append('token', token);
            formData.append('new_password', password);

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                if (response.ok) {
                    showToast(data.message);
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    showToast(data.detail || "Failed to reset password", true);
                }
            } catch (err) {
                showToast("An error occurred", true);
            }
        }
    </script>
</body>
</html>
