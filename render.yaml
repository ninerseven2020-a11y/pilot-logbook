services:
  - type: web
    name: pilot-logbook
    env: docker
    plan: free
    region: singapore
    envVars:
      - key: LOGBOOK_DATA_DIR
        value: /app/data
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SECRET_KEY
        sync: false
