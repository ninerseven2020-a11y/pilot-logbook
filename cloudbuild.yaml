steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/pilot-logbook:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/pilot-logbook:latest', '.']

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/pilot-logbook:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/pilot-logbook:latest']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'pilot-logbook'
      - '--image=gcr.io/$PROJECT_ID/pilot-logbook:$COMMIT_SHA'
      - '--region=us-central1'
      - '--memory=2Gi'
      - '--add-volume=name=db-volume,type=cloud-storage,bucket=logbook-495813-db-bucket'
      - '--add-volume-mount=volume=db-volume,mount-path=/app/data'

images:
  - 'gcr.io/$PROJECT_ID/pilot-logbook:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/pilot-logbook:latest'

options:
  logging: CLOUD_LOGGING_ONLY
