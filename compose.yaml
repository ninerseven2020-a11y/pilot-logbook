version: '3.8'

services:
  logbook-app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/logbook.db
      # THE SECRETS BELOW ARE PLACEHOLDERS. 
      # DO NOT PUT ACTUAL SECRETS HERE. 
      # ENTER THEM IN THE SYNOLOGY CONTAINER MANAGER UI OR A .env FILE.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
    restart: always
